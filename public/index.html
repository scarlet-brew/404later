<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404later — Bookmark Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>404later</h1>
      <p class="tagline">Save, tag, and organize your bookmarks.</p>
    </header>

    <main>
      <!-- Add bookmark form -->
      <section class="card" aria-labelledby="add-heading">
        <h2 id="add-heading">Add a bookmark</h2>
        <form id="add-form" novalidate>
          <div class="field">
            <label for="url">URL <span class="required">*</span></label>
            <input type="url" id="url" name="url" placeholder="https://example.com" required />
          </div>
          <div class="field">
            <label for="title">Title <span class="required">*</span></label>
            <input type="text" id="title" name="title" placeholder="Example site" required />
          </div>
          <div class="field">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="Optional notes" />
          </div>
          <div class="field">
            <label for="tags">Tags</label>
            <input type="text" id="tags" name="tags" placeholder="comma, separated, tags" />
          </div>
          <button type="submit" class="btn-primary">Add bookmark</button>
          <p id="form-message" class="message" role="status" aria-live="polite"></p>
        </form>
      </section>

      <!-- Bookmark list -->
      <section class="card" aria-labelledby="list-heading">
        <div class="list-header">
          <h2 id="list-heading">Your bookmarks</h2>
          <span id="count" class="count"></span>
        </div>
        <p id="list-message" class="message" role="status" aria-live="polite"></p>
        <ul id="bookmark-list" class="bookmark-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
